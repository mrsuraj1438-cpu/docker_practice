<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Learning</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      overflow: hidden;
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 3rem;
      line-height: 1.4;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #00dbde, #fc00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 3s infinite alternate;
    }

    p {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #ccc;
      animation: slideUp 2s ease-in-out;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #00dbde;
      }
      to {
        text-shadow: 0 0 25px #fc00ff;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(45deg, #ff6a00, #ee0979);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: bold;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }

  </style>
</head>
<body>

  <div class="badge">🚀 DevOps Learning</div>

  <div class="container">
    <h1>
      Today I Learned How Dockerfile Works<br>
      To Run Applications Inside Containers
    </h1>
    <p>
      Hands-on practice helps me understand how Docker actually works in real projects.
    </p>
  </div>

  <div class="footer">
    Made with ❤️ by You
  </div>

</body>
</html>
